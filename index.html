<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف بيمن & ايلاريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ffc0cb;
            --white: #ffffff;
            --black: #000000;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Cairo', sans-serif;
        }

        /* شاشة الغلاف (الأبيض والورد) */
        #envelope {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: transform 1.5s ease-in-out;
        }

        /* تأثير تساقط الورد */
        .petal {
            position: absolute; top: -10%;
            background-color: var(--pink);
            border-radius: 150% 0 150% 0;
            opacity: 0.7; animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        #open-btn {
            padding: 15px 40px; font-size: 24px; cursor: pointer;
            background: var(--pink); border: none; border-radius: 25px;
            font-family: 'Cairo', sans-serif; color: var(--black);
            z-index: 101; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* انقسام الشاشة */
        .split-left, .split-right {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: white; transition: 1.5s;
        }
        .split-left { left: 0; border-right: 1px solid #eee; }
        .split-right { right: 0; }

        .opened .split-left { transform: translateX(-100%); }
        .opened .split-right { transform: translateX(100%); }

        /* محتوى الدعوة */
        #invitation-card {
            background: #fffafa; /* أبيض مائل للوردي خفيف جداً */
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: var(--black); padding: 20px;
        }

        .verse { font-family: 'Amiri', serif; font-size: 1.8rem; margin-bottom: 20px; color: #555; }
        .names { font-size: 2.5rem; font-weight: bold; margin: 15px 0; }
        .details { font-size: 1.2rem; line-height: 1.8; }
        
        .countdown {
            font-size: 1rem; margin-top: 20px; background: var(--pink);
            padding: 5px 15px; border-radius: 10px;
        }

        .location-link {
            display: inline-block; margin-top: 10px; color: #d02090;
            text-decoration: none; font-weight: bold; font-size: 0.9rem;
        }

<div id="ytplayer" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
player = new YT.Player('ytplayer', {
height: '0',
width: '0',
videoId: '49kzVeoM7Ro',
events: {
'onReady': function(event){
event.target.setVolume(50);
event.target.playVideo();
}
},
playerVars: {
'autoplay': 1,
'loop': 1,
'playlist': '49kzVeoM7Ro'
}
});
}
</script>
</head>
<body>

    <div id="player"></div>

    <div id="envelope">
        <div class="split-left"></div>
        <div class="split-right"></div>
        <button id="open-btn" onclick="openInvitation()">OPEN</button>
        </div>

    <div id="invitation-card">
        <div class="verse">"فَالَّذِي جَمَعَهُ اللهُ لَا يُفَرِّقُهُ إِنْسَانٌ" (مت 19: 5-6)</div>
        <div class="names">بيمن & ايلاريا</div>
        <div class="details">
            <p>يتشرفون بدعوتكم لحفل الزفاف</p>
            <p>يوم الخميس 17/9/2026 الساعة 8 مساءً</p>
            <p>كنيسة رئيس الملائكة ميخائيل <br> <a class="location-link" href="https://maps.google.com/?q=كنيسة+رئيس+الملائكة+ميخائيل" target="_blank">📍 موقع الكنيسة</a></p>
            <p>قاعة رويال بلازا (دار ضباط الأمن المركزي) <br> <a class="location-link" href="https://maps.google.com/?q=قاعة+رويال+بلازا" target="_blank">📍 موقع القاعة</a></p>
        </div>
        
        <div class="countdown" id="timer">جارٍ التحميل...</div>
    </div>

    <script>
        // إنشاء تساقط الورد
        function createPetals() {
            const envelope = document.getElementById('envelope');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = petal.style.height = (Math.random() * 15 + 5) + 'px';
                petal.style.animationDuration = (Math.random() * 3 + 2) + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                envelope.appendChild(petal);
            }
        }
        createPetals();

        // فتح الدعوة وتشغيل الموسيقى
        function openInvitation() {
            document.getElementById('envelope').classList.add('opened');
            setTimeout(() => {
                document.getElementById('envelope').style.display = 'none';
            }, 1500);
            player.playVideo();
        }

        // عد تنازلي صغير
        const weddingDate = new Date("Sept 17, 2026 20:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("timer").innerHTML = `باقي ${days} يوم و ${hours} ساعة`;
        }, 1000);

        // تشغيل أغنية يوتيوب في الخلفية
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: '49kzVeoM7Ro', // كود الأغنية
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady(event) {
            // الموسيقى جاهزة وستعمل عند الضغط على OPEN
        }
    </script>
</body>
</html>
