<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف بيمن & ايلاريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #ffffff; font-family: 'Cairo', sans-serif; }

        /* شاشة الغلاف */
        #envelope {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        /* الورد المتساقط */
        .petal {
            position: absolute; top: -20px; background-color: #ffc0cb;
            border-radius: 150% 0 150% 0; opacity: 0.6;
            animation: fall linear infinite; z-index: 99;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        #open-btn {
            padding: 15px 50px; font-size: 22px; cursor: pointer;
            background: #ffc0cb; border: none; border-radius: 30px;
            font-family: 'Cairo', sans-serif; color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 102;
            transition: 0.3s;
        }

        /* انقسام الشاشة عند الفتح */
        .door {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: white; transition: 1.5s ease-in-out; z-index: 101;
        }
        .left-door { left: 0; border-right: 1px solid #fdf2f4; }
        .right-door { right: 0; }

        .opened .left-door { transform: translateX(-100%); }
        .opened .right-door { transform: translateX(100%); }
        .opened #open-btn { display: none; }

        /* محتوى الدعوة الثابت بالخلف */
        #invitation-card {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; background: #fffcfd;
            padding: 20px; box-sizing: border-box;
        }

        .verse { font-family: 'Amiri', serif; font-size: 1.5rem; color: #444; margin-bottom: 20px; line-height: 1.6; }
        .names { font-size: 2.2rem; font-weight: bold; color: #000; margin: 10px 0; }
        .details { font-size: 1.1rem; line-height: 1.8; color: #333; }
        .location-btn {
            display: inline-block; margin-top: 10px; padding: 5px 15px;
            background: #fff; border: 1px solid #ffc0cb; border-radius: 15px;
            color: #d02090; text-decoration: none; font-size: 0.9rem;
        }
        .countdown { margin-top: 25px; font-size: 0.9rem; color: #888; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <iframe id="youtube-audio" width="0" height="0" src="https://www.youtube.com/embed/49kzVeoM7Ro?enablejsapi=1" frameborder="0"></iframe>

    <div id="envelope">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <button id="open-btn" onclick="startEverything()">Open</button>
    </div>

    <div id="invitation-card">
        <div class="verse">"فَالَّذِي جَمَعَهُ اللهُ لَا يُفَرِّقُهُ إِنْسَانٌ" (مت 19: 5-6)</div>
        <div class="names">بيمن & ايلاريا</div>
        <div class="details">
            يتشرفون بدعوتكم لحفل الزفاف <br>
            <b>يوم الخميس 17/9/2026 الساعة 8 مساءً</b> <br><br>
            كنيسة رئيس الملائكة ميخائيل <br>
            <a class="location-btn" href="https://maps.google.com/?q=كنيسة+رئيس+الملائكة+ميخائيل" target="_blank">📍 موقع الكنيسة</a> <br><br>
            قاعة رويال بلازا (دار ضباط الأمن المركزي) <br>
            <a class="location-btn" href="https://maps.google.com/?q=قاعة+رويال+بلازا" target="_blank">📍 موقع القاعة</a>
        </div>
        <div class="countdown" id="timer"></div>
    </div>

    <script>
        // دالة إنشاء الورد المتساقط تلقائياً
        function createPetals() {
            const container = document.getElementById('envelope');
            for (let i = 0; i < 40; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                const size = (Math.random() * 15 + 10) + 'px';
                petal.style.width = size;
                petal.style.height = size;
                petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }
        createPetals();

        // دالة الفتح وتشغيل الموسيقى
        function startEverything() {
            document.getElementById('envelope').classList.add('opened');
            
            // تشغيل الموسيقى عبر الـ Iframe API
            const iframe = document.getElementById('youtube-audio');
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');

            // إخفاء الغلاف تماماً بعد انتهاء الحركة
            setTimeout(() => {
                document.getElementById('envelope').style.zIndex = "-1";
            }, 1500);
        }

        // عد تنازلي بسيط
        const targetDate = new Date("September 17, 2026 20:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerHTML = `متبقي على الفرح ${days} يوم`;
        }, 1000);
    </script>
</body>
</html>
