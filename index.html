<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دعوة زفاف - بيمن ♥ ايلاريا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #000;
    overflow: hidden;
}

/* الفيديو */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* المحتوى بعد الفيديو */
.content {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    display: none;
    text-align: center;
    color: white;
    background: rgba(0,0,0,0.5);
    padding-top: 80px;
}

.title {
    font-size: 45px;
    text-shadow: 0 0 20px pink;
}

.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background: pink;
    cursor: pointer;
    font-size: 16px;
}

/* ورد متساقط */
.petal {
    position: fixed;
    top: -10px;
    font-size: 18px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

    </p>

</div>

<!-- 🎵 الأغنية -->
